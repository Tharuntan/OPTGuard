services:
  - type: web
    name: optguard-api
    runtime: docker
    plan: free
    rootDir: optguard/backend
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: optguard-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: optguard-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: optguard-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: optguard-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: optguard-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_DEMO_DATA
        value: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://YOUR-VERCEL-DOMAIN.vercel.app

databases:
  - name: optguard-db
    plan: free
