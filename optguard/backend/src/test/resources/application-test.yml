spring:
  datasource:
    url: jdbc:h2:mem:optguard-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  jwt:
    secret: test-secret-value-with-at-least-32-characters
    expiration-ms: 86400000
  seed-demo-data: false

logging:
  level:
    root: warn
    org.hibernate.SQL: warn
