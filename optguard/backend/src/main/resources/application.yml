spring:
  application:
    name: optguard-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:optguard}}
    username: ${DB_USERNAME:${DB_USER:optguard}}
    password: ${DB_PASSWORD:${DB_PASS:optguard}}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me-with-at-least-32-characters}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
  seed-demo-data: ${SEED_DEMO_DATA:true}
