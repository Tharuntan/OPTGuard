services:
  postgres:
    image: postgres:16-alpine
    container_name: optguard-postgres
    environment:
      POSTGRES_DB: optguard
      POSTGRES_USER: optguard
      POSTGRES_PASSWORD: optguard
    ports:
      - "5432:5432"
    volumes:
      - optguard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optguard -d optguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: optguard-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/optguard
      DB_USERNAME: optguard
      DB_PASSWORD: optguard
      JWT_SECRET: change-this-docker-secret-with-at-least-32-characters
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/optguard-ui
    container_name: optguard-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  optguard_postgres_data:
